# =============================================================================
# Design Reviewer — Full Configuration Example
# =============================================================================
#
# Place as config.yaml in the directory where you run design-reviewer,
# or pass --config /path/to/config.yaml on the command line.
#
#   cp config/example-config.yaml config.yaml
#
# Only the [aws] and [models] sections are required.
# Everything else has sensible defaults (shown below).
# =============================================================================

# ---------------------------------------------------------------------------
# AWS Configuration  (REQUIRED)
# ---------------------------------------------------------------------------
# SECURITY: Only temporary credentials via IAM roles, profiles, or STS are supported.
# Long-term access keys are NOT supported to follow security recommendations.
# ---------------------------------------------------------------------------
aws:
  # AWS region where Amazon Bedrock is enabled
  region: us-east-1

  # AWS profile name from ~/.aws/credentials or ~/.aws/config
  # Profile should use IAM roles, AWS SSO, or temporary credentials
  # Examples:
  #   - IAM role via instance profile or ECS task role
  #   - AWS SSO profile: aws sso login --profile <profile-name>
  #   - Temporary credentials via STS assume-role
  profile_name: default

  # Amazon Bedrock Guardrails (OPTIONAL - recommended for production)
  # Provides content filtering, PII redaction, and safety controls
  # See docs/ai-security/BEDROCK_GUARDRAILS.md for setup instructions
  # guardrail_id: abc123xyz          # Your guardrail ID from AWS
  # guardrail_version: "1"            # Guardrail version (or "DRAFT")

# ---------------------------------------------------------------------------
# Model Configuration  (REQUIRED)
# ---------------------------------------------------------------------------
models:
  # Model used by all agents unless overridden below
  # Supported: claude-opus-4-6 | claude-sonnet-4-6 | claude-haiku-4-5
  default_model: claude-sonnet-4-6

  # Per-agent overrides (optional — falls back to default_model)
  # critique_model: claude-opus-4-6       # more capable model for critique
  # alternatives_model: claude-sonnet-4-6
  # gap_model: claude-sonnet-4-6

# ---------------------------------------------------------------------------
# Review Settings  (OPTIONAL — defaults shown)
# ---------------------------------------------------------------------------
review:
  # Minimum severity level to include in reports
  # Values: critical | high | medium | low
  severity_threshold: medium

  # Toggle individual analysis agents
  enable_alternatives: true
  enable_gap_analysis: true

  # Quality score thresholds control the quality label in the report.
  # Score is a weighted sum: critical=4, high=3, medium=2, low=1 per finding.
  # quality_thresholds:
  #   excellent_max_score: 5        # score 0-5   → Excellent (Approve)
  #   good_max_score: 15            # score 6-15  → Good (Approve)
  #   needs_improvement_max_score: 30  # score 16-30 → Needs Improvement (Explore Alternatives)
  #                                    # score >30   → Poor (Request Changes)

# ---------------------------------------------------------------------------
# Logging Configuration  (OPTIONAL — defaults shown)
# ---------------------------------------------------------------------------
logging:
  # Path to the log file (relative to working directory, or absolute)
  log_file_path: logs/design-reviewer.log

  # Console log level: DEBUG | INFO | WARNING | ERROR | CRITICAL
  log_level: INFO

  # Log rotation: max file size before rotating (MB)
  max_log_size_mb: 2

  # Number of rotated backup files to keep
  backup_count: 5

# ---------------------------------------------------------------------------
# Advanced  (OPTIONAL — rarely needed)
# ---------------------------------------------------------------------------
# Override bundled pattern library or prompt directories:
# patterns_directory: ~/.design-reviewer/patterns
# prompts_directory: ~/.design-reviewer/prompts
